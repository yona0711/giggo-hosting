name: Build and Deploy Firebase

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: |
          cd client
          flutter pub get

      - name: Flutter analyze
        run: |
          cd client
          flutter analyze

      - name: Flutter build web
        run: |
          cd client
          flutter build web

      - name: Set Firebase project ID
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "FIREBASE_PROJECT_ID=giggo-8a302" >> "$GITHUB_ENV"
          else
            echo "FIREBASE_PROJECT_ID=giggo-staging" >> "$GITHUB_ENV"
          fi

      - name: Require service account credentials
        run: |
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "FIREBASE_AUTH_MODE=service-account" >> "$GITHUB_ENV"
          else
            echo "Missing FIREBASE_SERVICE_ACCOUNT secret. Add it in GitHub repo settings: Secrets and variables > Actions."
            exit 1
          fi

      - name: Configure service account credentials
        if: env.FIREBASE_AUTH_MODE == 'service-account'
        run: |
          SA_KEY_PATH="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$SA_KEY_PATH"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$SA_KEY_PATH" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        run: npx --yes firebase-tools@latest deploy -P "$FIREBASE_PROJECT_ID" --only hosting --non-interactive --debug
